name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install flac + ALSA (Linux)
        if: runner.os == 'Linux'
        # libasound2-dev is needed by cpal (intwav-playback) on Linux.
        run: sudo apt-get update && sudo apt-get install -y flac libasound2-dev

      - name: Install flac (macOS)
        if: runner.os == 'macOS'
        run: brew install flac

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Float-free check (intwav-core)
        run: bash scripts/check-no-float.sh
